<!DOCTYPE html>
<html>
<head>
  <title>Goofy Horror Park 3D-ish</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
let player = { x:300, y:300, size:20, speed:4 };

// Clown enemy
let enemy = { x:600, y:300, speed:2 };

// Carts
let carts = [];
for (let i = 0; i < 8; i++) {
  carts.push({
    angle: i * (Math.PI * 2 / 8),
    radius: 150 + Math.random()*150,
    speed: 0.01 + Math.random()*0.02
  });
}

// Sound (browser safe)
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator, gainNode;
let playing = false;

function startMusic() {
  if (playing) return;

  oscillator = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();

  oscillator.type = "square";
  oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  playing = true;
}

function stopMusic() {
  if (oscillator) oscillator.stop();
  playing = false;
}

// Controls
let keys = {};
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  // unlock audio (needed for browser)
  audioCtx.resume();

  if (gameState === "gameover" && e.key.toLowerCase() === "r") restart();
});
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Game state
let gameState = "play";
let redFade = 0;
let pull = 0;

// Restart
function restart() {
  gameState = "play";
  redFade = 0;
  pull = 0;
  player.x = 300;
  player.y = 300;
}

// Update
function update() {
  if (gameState !== "play") return;

  // Move player
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  // Enemy follow
  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  enemy.x += (dx/dist) * enemy.speed;
  enemy.y += (dy/dist) * enemy.speed;

  // 🎵 Distance music
  if (dist < 200) startMusic();
  else stopMusic();

  // Allow passing unless VERY close
  if (dist < 10) {
    gameState = "caught";
    stopMusic();
  }

  // Move carts
  carts.forEach(c => c.angle += c.speed);
}

// Draw
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 🎪 Circus stripes
  for (let i = 0; i < canvas.width; i += 80) {
    ctx.fillStyle = i % 160 === 0 ? "#800" : "#111";
    ctx.fillRect(i, 0, 40, canvas.height);
  }

  // 🎢 Tracks
  ctx.strokeStyle = "purple";
  for (let r = 100; r < 400; r += 60) {
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, r, 0, Math.PI*2);
    ctx.stroke();
  }

  if (gameState === "play") {

    // 🎢 Draw carts (fake 3D scaling)
    carts.forEach(c => {
      let cx = canvas.width/2 + Math.cos(c.angle)*c.radius;
      let cy = canvas.height/2 + Math.sin(c.angle)*c.radius;

      let scale = (cy / canvas.height); // fake depth
      let size = 20 + scale * 20;

      ctx.fillStyle = "orange";
      ctx.fillRect(cx - size/2, cy - size/2, size, size);
    });

    // 🤡 Clown
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x - 5, enemy.y - 5, 10, 10);

    // 🧍 Player (VERY visible now)
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(player.x, player.y, 12, 0, Math.PI*2);
    ctx.fill();

    // Flashlight
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.beginPath();
    ctx.rect(0,0,canvas.width,canvas.height);
    ctx.arc(player.x, player.y, 140, 0, Math.PI*2, true);
    ctx.fill("evenodd");
  }

  // CAUGHT
  if (gameState === "caught") {
    pull += 0.02;

    player.x += (enemy.x - player.x)*0.1;
    player.y += (enemy.y - player.y)*0.1;

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Rope
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.moveTo(enemy.x, enemy.y);
    ctx.lineTo(player.x, player.y);
    ctx.stroke();

    // Characters
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(player.x, player.y, 12, 0, Math.PI*2);
    ctx.fill();

    // Red fade
    redFade += 0.01;
    ctx.fillStyle = "rgba(255,0,0,"+redFade+")";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if (pull > 1.5) gameState = "gameover";
  }

  // GAME OVER
  if (gameState === "gameover") {
    ctx.fillStyle = "red";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "bold 60px monospace";
    ctx.textAlign = "center";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);

    ctx.font = "20px monospace";
    ctx.fillText("Press R to Restart", canvas.width/2, canvas.height/2 + 100);
  }
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
